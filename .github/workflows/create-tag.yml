name: Create Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.5)"
        required: true
        type: string
      message:
        description: "Tag message (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${{ inputs.tag }}"
            echo "Expected format: vX.Y.Z (e.g. v0.1.5)"
            exit 1
          fi

      - name: Check tag exists
        run: |
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.tag }} already exists"
            exit 1
          fi

      - name: Update package.json version
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${{ inputs.tag }}"
          git push origin HEAD

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -n "${{ inputs.message }}" ]; then
            git tag -a "${{ inputs.tag }}" -m "${{ inputs.message }}"
          else
            git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          fi
          git push origin "${{ inputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.message }}" ]; then
            gh release create "${{ inputs.tag }}" --title "${{ inputs.tag }}" --notes "${{ inputs.message }}"
          else
            gh release create "${{ inputs.tag }}" --title "${{ inputs.tag }}" --generate-notes
          fi
