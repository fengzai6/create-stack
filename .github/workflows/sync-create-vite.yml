name: Sync with create-vite

on:
  schedule:
    - cron: '0 9 * * 1' # 每周一 09:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download latest create-vite templates
        run: |
          mkdir -p /tmp/create-vite
          cd /tmp/create-vite
          npm pack create-vite
          tar -xzf create-vite-*.tgz
          echo "=== create-vite version ==="
          cat package/package.json | grep '"version"'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: AI 分析 diff 并更新模板
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml <<EOF
          openai_base_url = "${{ secrets.OPENAI_BASE_URL }}"
          model = "gpt-5.4"
          EOF
          echo '{"OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}"}' > ~/.codex/auth.json

          VITE_VERSION=$(cat /tmp/create-vite/package/package.json | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          echo "create-vite version: $VITE_VERSION"

          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            "你是一个专业的前端工程师。
            第一阶段：同步更新
            1. 请对比 /tmp/create-vite/package/template-react-ts 与本项目 templates/ 目录下各模板的配置文件差异。
            2. 重点关注：vite.config.ts, tsconfig.json, tsconfig.app.json, tsconfig.node.json, eslint.config.js, index.html, 以及 package.json 中的 devDependencies（vite、typescript、eslint 相关）。
            3. 将 create-vite 上游的合理更新同步到本项目的 templates/ 下对应文件中。注意保留本项目已有的自定义内容（如 tailwind、antd、react-router 相关配置）。
            4. 不要执行任何 git 命令，不要修改 templates/ 下的 node_modules 目录。

            第二阶段：Build 检查与修复
            1. 如果完成了同步修改，请从 templates/ 目录下随机选择一个受影响的模板（优先选择复杂的模板，如 react-router-tailwind-antd）。
            2. 在该模板目录下尝试执行 build 检查：
               - 执行 npm install (使用 --no-package-lock 以免产生多余 diff)。
               - 执行 npm run build 进行构建。
            3. 如果构建失败：
               - 仔细分析错误日志。
               - 修改本项目中相关文件（如 tsconfig 或代码）以修复 build 失败的问题。
               - 再次执行 npm run build 验证修复效果。
            4. 完成后，将同步变更和 Build 检查的结果（包括选择的模板、修复过程等）详细记录并在 /tmp/sync-summary.md 中以 markdown 格式输出。"

      - name: 检查是否有变更
        id: check
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 创建 PR
        if: steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VITE_VERSION=$(cat /tmp/create-vite/package/package.json | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          BRANCH="sync/create-vite-${VITE_VERSION}-$(date +%Y%m%d)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A -- ':!templates/*/node_modules'
          git commit -m "sync: update templates from create-vite v${VITE_VERSION}"
          git push origin "$BRANCH" --force

          SUMMARY=$(cat /tmp/sync-summary.md 2>/dev/null || echo '无变更摘要')

          PR_BODY=$(printf '## 自动同步 create-vite 模板变更\n\n**create-vite 版本**: v%s\n**触发时间**: %s\n\n## AI 变更摘要\n\n%s' \
            "${VITE_VERSION}" \
            "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            "${SUMMARY}")

          gh pr create \
            --title "sync: update templates from create-vite v${VITE_VERSION}" \
            --body "${PR_BODY}" \
            --reviewer fengzai6 \
            --base main
